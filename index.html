<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTIMATIVER INTERNET FEHLER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Comic Sans MS;
user-select:none;
}

body{
overflow:hidden;
background:black;
color:white;
height:100vh;
cursor:crosshair;
transition:0.2s;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-10;
}

#mainTitle{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:70px;
font-weight:bold;
color:#ff00aa;
text-shadow:
0 0 20px #ff00aa,
0 0 40px #ff00aa,
0 0 80px #ff00aa;
animation:wiggle 0.1s infinite alternate;
}

@keyframes wiggle{
from{
transform:translateX(-3px) rotate(-1deg);
}
to{
transform:translateX(3px) rotate(1deg);
}
}

#sub{
position:absolute;
top:110px;
width:100%;
text-align:center;
font-size:22px;
color:#00ffff;
}

.panel{
position:absolute;
background:rgba(255,255,255,0.08);
border:2px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:25px;
padding:20px;
box-shadow:0 0 30px rgba(255,0,170,0.3);
}

#stats{
left:20px;
top:180px;
width:260px;
}

#chat{
right:20px;
top:180px;
width:320px;
height:300px;
overflow:hidden;
}

#centerChaos{
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:400px;
text-align:center;
}

.bar{
width:100%;
height:25px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00aa,#00ffff);
transition:0.3s;
}

button{
padding:15px 25px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
background:linear-gradient(45deg,#ff00aa,#7c3aed);
color:white;
cursor:pointer;
margin:10px;
box-shadow:0 0 20px #ff00aa;
transition:0.2s;
}

button:hover{
transform:scale(1.15) rotate(3deg);
}

#dvd{
position:absolute;
width:160px;
height:80px;
border-radius:20px;
background:linear-gradient(45deg,#ff0000,#00ffff);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
box-shadow:0 0 30px white;
}

.popup{
position:absolute;
padding:20px;
background:white;
color:black;
font-weight:bold;
border-radius:20px;
animation:popup 0.3s;
box-shadow:0 0 40px white;
z-index:999;
}

@keyframes popup{
from{
transform:scale(0);
}
to{
transform:scale(1);
}
}

#brainrot{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:30px;
color:#00ff99;
text-shadow:0 0 20px #00ff99;
}

.floating{
position:absolute;
font-size:50px;
pointer-events:none;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
from{
transform:translateY(100vh) rotate(0deg);
}
to{
transform:translateY(-200px) rotate(720deg);
}
}

.glitch{
animation:glitch 0.08s infinite;
}

@keyframes glitch{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,0);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,2px);}
100%{transform:translate(0,0);}
}

.chatMessage{
margin-bottom:12px;
padding:10px;
border-radius:15px;
background:rgba(255,255,255,0.08);
}

.warning{
color:#ff5555;
font-weight:bold;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="mainTitle">
ULTIMATIVE CHAOS WEBSITE
</div>

<div id="sub">
Diese Website hätte niemals erstellt werden dürfen.
</div>

<div class="panel" id="stats">

<h2>LIVE CHAOS DATEN</h2>

<div style="margin-top:20px;">
Mentale Stabilität
</div>

<div class="bar">
<div class="fill" id="mentalBar"></div>
</div>

<div style="margin-top:20px;">
Brainrot Level
</div>

<div class="bar">
<div class="fill" id="brainrotBar"></div>
</div>

<div style="margin-top:20px;">
Internetschaden
</div>

<div class="bar">
<div class="fill" id="damageBar"></div>
</div>

</div>

<div class="panel" id="chat">

<h2>LIVE CHAT</h2>

<div id="messages" style="margin-top:20px;"></div>

</div>

<div class="panel" id="centerChaos">

<h1>DO NOT CONTINUE</h1>

<button onclick="activateUltraChaos()">
AKTIVIEREN
</button>

<button onclick="spawn1000Things()">
1000 DINGE SPAWNEN
</button>

<button onclick="fakeVirus()">
FREE VBUCKS
</button>

<button onclick="brainrotMode()">
BRAINROT MODE
</button>

</div>

<div id="dvd">
ERROR
</div>

<div id="brainrot">
Der Kühlschrank beobachtet dich.
</div>

<script>

const canvas =
document.getElementById("stars");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

let stars = [];

for(let i=0;i<300;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3

});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.size,0,Math.PI*2);

ctx.fill();

s.y += 0.5;

if(s.y > canvas.height){

s.y = 0;

}

});

requestAnimationFrame(drawStars);

}

drawStars();

let dvd =
document.getElementById("dvd");

let x = 100;
let y = 100;

let dx = 5;
let dy = 5;

function moveDVD(){

x += dx;
y += dy;

if(x + 160 > window.innerWidth || x < 0){

dx *= -1;

randomColor();

}

if(y + 80 > window.innerHeight || y < 0){

dy *= -1;

randomColor();

}

dvd.style.left = x + "px";
dvd.style.top = y + "px";

requestAnimationFrame(moveDVD);

}

moveDVD();

function randomColor(){

document.body.style.background =
"hsl(" + Math.random()*360 + ",100%,8%)";

}

const randomMessages = [

"Warum bewegt sich die Wand?",
"Wer hat den Toast angerufen?",
"Bitte füttere den Router nicht.",
"Reality.exe wurde beendet.",
"Der Hamster kontrolliert das WLAN.",
"Du wurdest ausgewählt.",
"Dieser Satz hat keinen Sinn.",
"Der Boden ist aus Internet.",
"Die Katze übernimmt das System."

];

setInterval(()=>{

document.getElementById("brainrot").innerHTML =
randomMessages[
Math.floor(Math.random()*randomMessages.length)
];

},2500);

function createPopup(text){

let popup =
document.createElement("div");

popup.className = "popup";

popup.innerHTML = text;

popup.style.left =
Math.random()*window.innerWidth + "px";

popup.style.top =
Math.random()*window.innerHeight + "px";

document.body.appendChild(popup);

setTimeout(()=>{

popup.remove();

},2500);

}

function activateUltraChaos(){

document.body.classList.add("glitch");

setInterval(()=>{

createFloating();

},100);

setInterval(()=>{

createPopup("⚠ SYSTEMFEHLER ⚠");

},300);

}

function createFloating(){

const emojis = [
"🔥",
"🐈",
"💀",
"🧀",
"🗿",
"👁",
"🚨",
"🍞",
"🌀"
];

let div =
document.createElement("div");

div.className = "floating";

div.innerHTML =
emojis[
Math.floor(Math.random()*emojis.length)
];

div.style.left =
Math.random()*window.innerWidth + "px";

div.style.animationDuration =
(4 + Math.random()*6) + "s";

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},10000);

}

function spawn1000Things(){

for(let i=0;i<200;i++){

setTimeout(()=>{

let btn =
document.createElement("button");

btn.innerHTML = "???";

btn.style.position = "absolute";

btn.style.left =
Math.random()*window.innerWidth + "px";

btn.style.top =
Math.random()*window.innerHeight + "px";

btn.onclick = ()=>{

document.body.style.filter =
"hue-rotate(" +
Math.random()*360 +
"deg)";

};

document.body.appendChild(btn);

},i*20);

}

}

function fakeVirus(){

for(let i=0;i<50;i++){

setTimeout(()=>{

createPopup(
"⚠ VIRUS GEFUNDEN ⚠"
);

},i*100);

}

}

function brainrotMode(){

let audio =
new Audio(
"https://www.soundjay.com/button/beep-07.wav"
);

setInterval(()=>{

audio.play();

document.body.style.transform =
"rotate(" +
(Math.random()*2-1) +
"deg)";

},400);

}

const chatTexts = [

"Kevin: warum lebt die website",
"Sarah: ich habe angst",
"Max: FREE ROBUX???",
"Unknown: der toaster spricht",
"Luca: mein browser weint",
"Emma: was passiert hier",
"System: REALITY FAILURE",
"Bot: meow"

];

setInterval(()=>{

let msg =
document.createElement("div");

msg.className = "chatMessage";

msg.innerHTML =
chatTexts[
Math.floor(Math.random()*chatTexts.length)
];

document.getElementById("messages")
.prepend(msg);

if(document.getElementById("messages")
.children.length > 10){

document.getElementById("messages")
.lastChild.remove();

}

},1200);

let mental = 100;

setInterval(()=>{

mental--;

if(mental < 0){
mental = 0;
}

document.getElementById("mentalBar")
.style.width = mental + "%";

document.getElementById("brainrotBar")
.style.width =
(100-mental) + "%";

document.getElementById("damageBar")
.style.width =
Math.random()*100 + "%";

},300);

document.addEventListener("mousemove",(e)=>{

if(Math.random() > 0.92){

let spark =
document.createElement("div");

spark.innerHTML = "✨";

spark.style.position = "absolute";

spark.style.left = e.clientX + "px";

spark.style.top = e.clientY + "px";

spark.style.fontSize = "30px";

document.body.appendChild(spark);

setTimeout(()=>{

spark.remove();

},1000);

}

});

</script>

</body>
</html>
