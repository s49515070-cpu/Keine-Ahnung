<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herr Nagler Match Test</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top,#ff00aa 0%,#140014 40%,#000 100%);
  overflow-x:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.bg1,.bg2{
  position:fixed;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(180px);
  opacity:0.25;
  z-index:-1;
}

.bg1{
  background:#ff00aa;
  top:-100px;
  left:-100px;
}

.bg2{
  background:#7c3aed;
  bottom:-100px;
  right:-100px;
}

.container{
  width:720px;
  background:rgba(10,10,10,0.78);
  backdrop-filter:blur(12px);
  border-radius:30px;
  padding:40px;
  box-shadow:0 0 40px rgba(255,0,170,0.4);
  border:2px solid rgba(255,255,255,0.08);
}

h1{
  text-align:center;
  font-size:42px;
  color:#ff4fd8;
  text-shadow:0 0 15px #ff00aa;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  margin-bottom:35px;
  color:#d4d4d4;
  font-size:18px;
}

.question{
  margin-bottom:24px;
}

label{
  display:block;
  margin-bottom:10px;
  font-size:18px;
  color:#ffb3ef;
  font-weight:bold;
}

textarea{
  width:100%;
  border:none;
  outline:none;
  border-radius:18px;
  padding:15px;
  background:#1f1f1f;
  color:white;
  font-size:15px;
  resize:none;
  border:2px solid transparent;
  transition:0.2s;
}

textarea:focus{
  border:2px solid #ff00aa;
  box-shadow:0 0 15px rgba(255,0,170,0.5);
  transform:scale(1.01);
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(90deg,#ff00aa,#7c3aed);
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
  margin-top:10px;
  box-shadow:0 0 20px rgba(255,0,170,0.5);
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(255,0,170,0.8);
}

#resultBox{
  margin-top:35px;
  display:none;
}

.percent{
  font-size:65px;
  text-align:center;
  font-weight:bold;
  color:#fff;
  text-shadow:0 0 20px #ff00aa;
}

.bar{
  width:100%;
  height:28px;
  background:#2a2a2a;
  border-radius:30px;
  overflow:hidden;
  margin-top:20px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff00aa,#7c3aed);
  transition:1.2s;
}

.message{
  text-align:center;
  margin-top:20px;
  font-size:22px;
  color:#ffb3ef;
}

.extra{
  text-align:center;
  margin-top:12px;
  color:#d4d4d4;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

<h1>HERR NAGLER MATCH TEST</h1>

<div class="subtitle">
Finde heraus ob ihr destined seid oder kompletter toxic chaos wärt
</div>

<div class="question">
<label>Wie oft denkst du täglich an Herr Nagler?</label>
<textarea id="q1" rows="2"></textarea>
</div>

<div class="question">
<label>Was macht ihn für dich attraktiv?</label>
<textarea id="q2" rows="2"></textarea>
</div>

<div class="question">
<label>Wie würdest du reagieren wenn er plötzlich „bleib kurz nach dem Unterricht“ sagt?</label>
<textarea id="q3" rows="2"></textarea>
</div>

<div class="question">
<label>Was wäre euer größtes Problem als Duo?</label>
<textarea id="q4" rows="2"></textarea>
</div>

<div class="question">
<label>Wie sehr würdest du für Aufmerksamkeit peinlich werden?</label>
<textarea id="q5" rows="2"></textarea>
</div>

<div class="question">
<label>Beschreibe euren gemeinsamen Vibe in einem Satz</label>
<textarea id="q6" rows="2"></textarea>
</div>

<button onclick="calculateMatch()">
MATCH BERECHNEN
</button>

<div id="resultBox">

<div class="percent" id="percent">
0%
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="message" id="message"></div>

<div class="extra" id="extra"></div>

</div>

</div>

<script>

function calculateMatch(){

  let answers = [
    q1.value.toLowerCase(),
    q2.value.toLowerCase(),
    q3.value.toLowerCase(),
    q4.value.toLowerCase(),
    q5.value.toLowerCase(),
    q6.value.toLowerCase()
  ];

  let score = 0;

  const positiveWords = [
    "liebe",
    "verliebt",
    "cute",
    "hot",
    "süß",
    "perfekt",
    "immer",
    "heiraten",
    "träume",
    "obsessed",
    "crazy",
    "toxic",
    "freaky",
    "date",
    "romantisch",
    "crush",
    "sympathisch",
    "wow",
    "besessen"
  ];

  answers.forEach(answer => {

    score += Math.min(answer.length / 3.5, 15);

    positiveWords.forEach(word => {

      if(answer.includes(word)){
        score += 6;
      }

    });

  });

  // random cinematic effect
  score += Math.floor(Math.random() * 15);

  if(score > 100){
    score = 100;
  }

  score = Math.round(score);

  let msg = "";
  let extra = "";

  if(score < 20){

    msg = "Nur akademische Beziehung 😭";

    extra = "Ihr würdet wahrscheinlich nur über Hausaufgaben reden.";

  }

  else if(score < 40){

    msg = "Leichter Crush detected 👀";

    extra = "Da ist Spannung… aber noch kontrollierbar.";

  }

  else if(score < 60){

    msg = "Gefährliche Kombination 💀";

    extra = "Ihr würdet euch gegenseitig komplett ablenken.";

  }

  else if(score < 80){

    msg = "MAXIMALER FREAKY VIBE 🔥";

    extra = "Die Klasse würde sofort merken dass da irgendwas läuft.";

  }

  else{

    msg = "SOULMATE LEVEL ERREICHT ❤️";

    extra = "Das ist kein Crush mehr. Das ist ein kompletter Herr-Nagler-Story-Arc.";

  }

  document.getElementById("resultBox").style.display = "block";

  document.getElementById("percent").innerHTML = score + "%";

  document.getElementById("fill").style.width = score + "%";

  document.getElementById("message").innerHTML = msg;

  document.getElementById("extra").innerHTML = extra;

}

</script>

</body>
</html>
